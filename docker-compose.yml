version: "3.9"
networks:
  url-shortener:
    driver: bridge
volumes:
  url_db_data:
  analytics_db_data:
  user_db_data:
  notification_db_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:
services:
  # ── Databases ────────────────────────────────────────────────────────────────
  url_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urldb
      POSTGRES_USER: urluser
      POSTGRES_PASSWORD: urlpass
    ports:
      - "5432:5432"
    volumes:
      - url_db_data:/var/lib/postgresql/data
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urluser -d urldb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  analytics_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analyticsdb
      POSTGRES_USER: analyticsuser
      POSTGRES_PASSWORD: analyticspass
    ports:
      - "5433:5432"
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyticsuser -d analyticsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  user_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: useruser
      POSTGRES_PASSWORD: userpass
    ports:
      - "5434:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U useruser -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  notification_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: notificationuser
      POSTGRES_PASSWORD: notificationpass
    ports:
      - "5435:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notificationuser -d notificationdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  # ── Message Broker ───────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
  # ── Cache ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no # ephemeral; cache only
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - url-shortener
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  # ── Application Services ─────────────────────────────────────────────────────
  url-service:
    build:
      context: .
      dockerfile: services/url-service/Dockerfile
    environment:
      DATABASE_URL: postgres://urluser:urlpass@url_db:5432/urldb?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PORT: "8080"
      SHORT_URL_BASE: http://sho.rt
      JWT_SECRET: change-this-in-production-minimum-32-chars
      IP_HASH_SALT: change-this-in-production-random-salt
    ports:
      - "8081:8080"
    networks:
      - url-shortener
    depends_on:
      url_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    environment:
      DATABASE_URL: postgres://analyticsuser:analyticspass@analytics_db:5432/analyticsdb?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PORT: "8080"
      JWT_SECRET: change-this-in-production-minimum-32-chars
      IP_HASH_SALT: change-this-in-production-random-salt
    ports:
      - "8082:8080"
    networks:
      - url-shortener
    depends_on:
      analytics_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      DATABASE_URL: postgres://useruser:userpass@user_db:5432/userdb?sslmode=disable
      PORT: "8080"
      JWT_SECRET: change-this-in-production-minimum-32-chars
    ports:
      - "8083:8080"
    networks:
      - url-shortener
    depends_on:
      user_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      DATABASE_URL: postgres://notificationuser:notificationpass@notification_db:5432/notificationdb?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: change-this-in-production-minimum-32-chars
      PORT: "8080"
    ports:
      - "8084:8080"
    networks:
      - url-shortener
    depends_on:
      notification_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      URL_SERVICE_URL: http://url-service:8080
      ANALYTICS_SERVICE_URL: http://analytics-service:8080
      USER_SERVICE_URL: http://user-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-this-in-production-minimum-32-chars
      PORT: "8080"
    ports:
      - "8080:8080"
    networks:
      - url-shortener
    depends_on:
      url-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Monitoring ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=1h"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - url-shortener
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/circuit_breaker.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - url-shortener
    depends_on:
      - prometheus
    restart: unless-stopped
