version: '3.8'

services:
  # Infrastructure
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  url_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: url_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  analytics_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  user_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  notification_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notification_db
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Applications
  url-service:
    build:
      context: .
      dockerfile: services/url-service/Dockerfile
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgres://postgres:password@url_db:5432/url_db?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: change-this-in-production-minimum-32-chars
      SHORT_URL_BASE: http://localhost:8080
      IP_HASH_SALT: some-random-salt
      PORT: "8080"
    depends_on:
      url_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgres://postgres:password@analytics_db:5432/analytics_db?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: change-this-in-production-minimum-32-chars
      IP_HASH_SALT: some-random-salt
      PORT: "8080"
    depends_on:
      analytics_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports:
      - "8083:8080"
    environment:
      DATABASE_URL: postgres://postgres:password@user_db:5432/user_db?sslmode=disable
      JWT_SECRET: change-this-in-production-minimum-32-chars
      PORT: "8080"
    depends_on:
      user_db:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "8084:8080"
    environment:
      DATABASE_URL: postgres://postgres:password@notification_db:5432/notification_db?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: change-this-in-production-minimum-32-chars
      PORT: "8080"
    depends_on:
      notification_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      URL_SERVICE_URL: http://url-service:8080
      ANALYTICS_SERVICE_URL: http://analytics-service:8080
      USER_SERVICE_URL: http://user-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-this-in-production-minimum-32-chars
      PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
